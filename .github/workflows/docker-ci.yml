name: Docker Build and Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        # Only run if you want to push the image to a registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.Dockerhub_SignIn.DOCKERHUB_USERNAME }}
          password: ${{ secrets.Dockerhub_SignIn.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.Dockerhub_SignIn.DOCKERHUB_USERNAME }}/apartment-manager:latest
          # Use GitHub cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max